<header
  class="flex flex-row items-center justify-between w-screen h-25 bg-orange-300 border-gray-500 shadow-lg border-b"
>
  <button (click)="openMenu()" class="flex flex-col items-center justify-evenly w-20 h-4/5 ml-4">
    @for (item of items; track item.id) {
      <div
        [ngClass]="menuClasses(item.id)"
        class="w-14 h-1 rounded-lg bg-black transition-all duration-300 ease-in-out"
      ></div>
    } @empty {
      <div>Listan är tom</div>
    }
  </button>

  <div class="w-20 h-full flex items-center justify-center overflow-hidden">
    <img
      src="images/dugga-logo.webp"
      alt="Dugga logo"
      class="object-contain max-w-full max-h-full"
    />
  </div>

  <div class="w-20 h-full"></div>
</header>
